utlives the regime: a fragile hope amid the devastation.","p3":"<span class=\"A\">Ultimately, resistance contracts to the passive act of concealing those who still remember, a refuge that for most proves as futile as everything before it; yet by letting one rememberer outlast the regime, Ogawa allows a tiny ray of hope amid the devastation, that no oppression is permanent, and that a few, simply by enduring, may outlive it.</span> <span class=\"T\">Even the island’s organised resistance can only hide its charges, R conceding that beyond ‘a fairly large underground network that creates these safe houses’</span> <span class=\"E\">‘there isn’t really much else they can do.’</span> <span class=\"An\">Defiance has shrunk to mere concealment.</span> <span class=\"S\">Ogawa then exacts the cost of that refuge from R himself,</span> <span class=\"T\">whose body undergoes an ‘abstract transformation,’ his ‘muscles withering’ in the airless hidden room, and who meets his newborn son, ‘a baby boy,’ only as</span> <span class=\"E\">‘a picture of a baby drawn in colored pencil.’</span> <span class=\"An\">Hiding preserves the rememberer by slowly erasing him and severing him from his own child, a survival barely distinguishable from the disappearance it evades.</span> <span class=\"S\">That private cost is compounded by a tightening danger, for each new disappearance is one more loss the rememberer cannot counterfeit.</span> <span class=\"T\">When left legs vanish, those who remember cannot feign the loss, and the narrator dreads the Memory Police finding them</span> <span class=\"E\">‘still in possession of our legs.’</span> <span class=\"An\">Concealment, in the end, fails for most.</span> <span class=\"S\">And yet Ogawa refuses to close in total despair.</span> <span class=\"T\">Once ‘the Memory Police have given up their hunt,’ R</span> <span class=\"E\">‘climbed the ladder one rung at a time, lifted the trapdoor, and went out into the world,’ as ‘sunlight came streaming in for one moment.’</span> <span class=\"An\">A single rememberer walks free.</span> <span class=\"L\">Here, Ogawa preserves a fragile hope: no regime endures forever, and a few, by outlasting it in hiding, may survive the power that could not quite erase them.</span>","conc":"<div style=\"font-size:12px;font-family:'DM Sans',sans-serif;margin-bottom:8px;color:#6b7280\"><span style=\"color:#047857;font-weight:700\">● Resolve the journey</span>&nbsp;&nbsp;<span style=\"color:#9a3412;font-weight:700\">● Zoom out</span>&nbsp;&nbsp;<span style=\"color:#6d28d9;font-weight:700\">● Final claim</span></div><p><span style=\"color:#047857\">In <em>The Memory Police</em>, Ogawa traces resistance from the individual’s doomed struggle to hold onto memory, through a people too atomised to combine, to the passive hiding that fails for most and yet lets one rememberer walk free.</span> <span style=\"color:#9a3412\">Her allegory warns that a regime which commands memory commands everything, extinguishing the will to resist long before it ever needs force, a pattern Ogawa repeats even in the narrator’s own embedded novel, whose captive typist is slowly ‘absorbed’ into her prison until she can no longer imagine escape.</span> <span style=\"color:#6d28d9;font-weight:600\">And yet, in R’s modest hope to ‘delay or stop this decay… even in some small way,’ Ogawa leaves the faint possibility that memory, kept alive in a few, may outlast the power that sought to erase it.</span></p>"}]}];

else if(cur==="guide")pagerLabel="Model Paragraphs";else if(cur==="themes")pagerLabel="Quotes sorted by Key Concern";else if(cur==="essays")pagerLabel="Model Essays";else if(cur.slice(0,2)==="eq")pagerLabel="Model Essays";else pagerLabel="Home";

function renderGuide(){return`<h1>Essay Writing Guide</h1>
<p style="font-size:14px;color:var(--muted);margin:8px 0 16px;font-family:'DM Sans',sans-serif">A step-by-step guide to writing a Text Response essay on <em>The Memory Police</em>. Tap each section to open it. One rule runs through all of them: write clearly. If a sentence would lose a classmate reading it aloud, make it simpler.</p>

<details style="margin-bottom:12px" open>
<summary style="font-family:'DM Sans',sans-serif;font-size:16px;font-weight:700;cursor:pointer;padding:14px 16px;background:var(--card);border:1px solid var(--border);border-radius:8px;color:var(--ink)">1. Cracking the prompt</summary>
<div style="border:1px solid var(--border);border-top:none;border-radius:0 0 8px 8px;padding:18px;background:var(--card);font-size:14px;line-height:1.8;color:#374151">
<p style="margin-bottom:12px"><strong>Step 1: Underline the key words.</strong> Every prompt has two or three words that carry it. Those exact words have to show up in your contention, in every topic sentence, and every time you link back to the prompt. If the prompt says ‘adapting to loss,’ then ‘adapting’ and ‘loss’ run all the way through your essay.</p>
<p style="margin-bottom:12px"><strong>Step 2: Say it back in your own words.</strong> Ask yourself what the prompt is really asking. ‘How does <em>The Memory Police</em> suggest that memories are essential to give life meaning?’ just means: does Ogawa think memory is what makes life worth living?</p>
<p style="margin-bottom:12px"><strong>Step 3: Don’t just agree with it.</strong> A top essay adds something of its own, a twist, a ‘but,’ a deeper reading. If your contention only repeats the prompt back, it stays in the lower bands. Find the angle the prompt leaves out.</p>
<p style="margin-bottom:12px"><strong>Step 4: Plan your three body paragraphs.</strong> Think of them as one journey in three steps. Each step has a different job:</p>
<div style="background:#f8fafc;border:1px solid var(--border);border-radius:8px;padding:14px;margin-bottom:12px">
<p style="margin-bottom:8px"><strong style="color:#3b82f6">P1 · Establish:</strong> The clearest, most obvious way the prompt is true. Start on solid ground. This is your foundation.</p>
<p style="margin-bottom:8px"><strong style="color:#d97706">P2 · Complicate:</strong> Add something P1 did not say. If P2 is just P1 with new quotes, it hasn’t done its job. A word like ‘Yet’ or ‘But’ usually marks the shift.</p>
<p style="margin-bottom:0"><strong style="color:#059669">P3 · Resolve:</strong> Pull P1 and P2 together into your deepest point. This is where Ogawa finally comes down.</p>
</div>
<p style="margin-bottom:12px"><strong>Quick test:</strong> In one breath, can you say how P2 is <em>different</em> from P1, and how P3 <em>settles</em> what P1 and P2 set up? If you can’t, your paragraphs are just a list, not an argument.</p>
<p style="margin-bottom:12px"><strong>Use two characters or ideas per paragraph.</strong> Every paragraph should lean on at least two things, two characters (the narrator and the old man; R and the narrator), or a character and a symbol (the narrator and the music box; R and the hidden room). Build a whole paragraph on one character and it gets narrow and repetitive fast.</p>
<div style="background:#fef3c7;border:1px solid #fbbf24;border-radius:8px;padding:12px 16px;font-family:'DM Sans',sans-serif;font-size:13px;color:#92400e"><strong>Worked example (memory prompt):</strong><br>P1 (Establish): memory gives life meaning through the bonds between people (narrator + mother)<br>P2 (Complicate): those bonds survive even after the objects are destroyed (narrator + R)<br>P3 (Resolve): holding onto memory is the most human act of defiance, but it costs almost everything (R + narrator)</div>
</div>
</details>

<details style="margin-bottom:12px">
<summary style="font-family:'DM Sans',sans-serif;font-size:16px;font-weight:700;cursor:pointer;padding:14px 16px;background:var(--card);border:1px solid var(--border);border-radius:8px;color:var(--ink)">2. The introduction: the 4 Cs</summary>
<div style="border:1px solid var(--border);border-top:none;border-radius:0 0 8px 8px;padding:18px;background:var(--card);font-size:14px;line-height:1.8;color:#374151">
<p style="margin-bottom:12px">Your introduction makes four moves, in this order:</p>
<div style="background:#f8fafc;border:1px solid var(--border);border-radius:8px;padding:14px;margin-bottom:12px">
<p style="margin-bottom:10px"><strong style="color:var(--accent)">Context:</strong> Name Ogawa, name the novel, and name one thing about how it is written. For example: ‘Yōko Ogawa’s surrealist dystopian novel <em>The Memory Police</em>, told in restrained prose and symbolic imagery…’</p>
<p style="margin-bottom:10px"><strong style="color:var(--accent)">Contention:</strong> One sentence that answers the prompt. Start it with a joining word like <strong>Although, While, Despite</strong> or <strong>Even as</strong>. That word forces two ideas together, so straight away you are showing tension instead of just agreeing. This one sentence is your whole argument in miniature.</p>
<p style="margin-bottom:10px"><strong style="color:var(--accent)">Complexity:</strong> One short sentence that hints at what your later paragraphs will add, the ideas your contention hasn’t already said. Keep it to a single sentence. Don’t describe your own essay here: never write ‘this paragraph will complicate the argument’ or ‘in my second paragraph.’ Just say the idea. If there is a real fact about Ogawa that supports your reading, this is where it goes, for example that she has said <em>The Diary of Anne Frank</em> was the book that made her want to write.</p>
<p style="margin-bottom:0"><strong style="color:var(--accent)">Cute one-liner:</strong> One confident, memorable sentence that captures the whole argument.</p>
</div>
<div style="background:#eff6ff;border:1px solid #bfdbfe;border-radius:8px;padding:12px 16px;margin-bottom:12px;font-size:13px;color:#1e40af"><strong>Watch the difference:</strong> your <em>contention</em> is only the single claim sentence. The sentence that previews your later paragraphs is the <em>Complexity</em>, not part of the contention. Keep them apart, and keep the Complexity to one sentence, not a stack of ‘first… then… finally…’</div>
<p style="margin-bottom:8px"><strong>Contention scaffold:</strong></p>
<div style="background:var(--quote-bg);border:1px solid var(--border);border-radius:8px;padding:12px 16px;margin-bottom:12px;font-style:italic">‘Although Ogawa [obvious reading], she ultimately [deeper reading].’</div>
<p style="margin-bottom:8px"><strong>Model introduction:</strong></p>
<div class="model-box" style="margin-bottom:0">
<p><span style="background:#dbeafe;border-bottom:2px solid #3b82f6;border-radius:2px">Set on an unnamed island where memories, objects, and identities are systematically erased, Yōko Ogawa’s surrealist dystopian novel <em>The Memory Police</em> explores how authoritarian control hollows out human connection, told through restrained prose and accumulating symbolic imagery.</span> <span style="background:#ede9fe;border-bottom:2px solid #8b5cf6;border-radius:2px">Although the regime enforces disappearance through surveillance and violence, Ogawa laments that it is the islanders’ own passive acceptance, rather than the disappearances themselves, that poses the greatest threat to their humanity.</span> <span style="background:#d1fae5;border-bottom:2px solid #059669;border-radius:2px">Yet this silence feeds on itself, and the only counterweight Ogawa allows is the fragile human work of connection, creativity and memory.</span> <span style="background:#fce7f3;border-bottom:2px solid #db2777;border-radius:2px">Ogawa reminds the reader that people under oppression face a devastating choice: forget to survive but lose your humanity, or risk death to keep it.</span></p>
<div class="legend" style="margin-top:8px">
<span class="leg-item" style="background:#dbeafe;color:#1e40af;border-color:#3b82f6">Context</span>
<span class="leg-item" style="background:#ede9fe;color:#5b21b6;border-color:#8b5cf6">Contention</span>
<span class="leg-item" style="background:#d1fae5;color:#065f46;border-color:#059669">Complexity</span>
<span class="leg-item" style="background:#fce7f3;color:#9d174d;border-color:#db2777">Cute one-liner</span>
</div>
</div>
</div>
</details>

<details style="margin-bottom:12px">
<summary style="font-family:'DM Sans',sans-serif;font-size:16px;font-weight:700;cursor:pointer;padding:14px 16px;background:var(--card);border:1px solid var(--border);border-radius:8px;color:var(--ink)">3. Body paragraphs: ATEALS</summary>
<div style="border:1px solid var(--border);border-top:none;border-radius:0 0 8px 8px;padding:18px;background:var(--card);font-size:14px;line-height:1.8;color:#374151">
<p style="margin-bottom:12px">Every body paragraph follows the same six steps. The middle three (T, E, A) repeat for each quote.</p>
<div style="background:#f8fafc;border:1px solid var(--border);border-radius:8px;padding:14px;margin-bottom:12px">
<p style="margin-bottom:6px"><strong style="color:#1e40af">A · Argument:</strong> Your topic sentence. Make a claim using Ogawa’s name, a strong verb (like laments or exposes, never ‘shows’), and the prompt’s key words.</p>
<p style="margin-bottom:6px"><strong style="color:#5b21b6">T · Technique:</strong> Name the technique <em>before</em> the quote, characterisation, a symbol, the narrator’s tone, a metaphor. For example: ‘Ogawa’s characterisation of the narrator as emotionally numb appears in…’</p>
<p style="margin-bottom:6px"><strong style="color:#92400e">E · Evidence:</strong> The quote, built into your own sentence. Never drop a quote on its own.</p>
<p style="margin-bottom:6px"><strong style="color:#065f46">A · Analysis:</strong> What the technique does to meaning, the effect, not the plot. Don’t retell the story.</p>
<p style="margin-bottom:6px"><strong style="color:#9d174d">L · Link:</strong> Tie it back to your topic sentence. Start with ‘Here, Ogawa…’, never ‘This shows’ or ‘This suggests.’</p>
<p style="margin-bottom:0"><strong style="color:#9a3412">S · Segue:</strong> Carry the reader to the next quote or character so the paragraph reads as one flowing argument.</p>
</div>
<p style="margin-bottom:8px"><strong>Weak vs strong:</strong></p>
<div style="background:#fef2f2;border:1px solid #fca5a5;border-radius:8px;padding:12px 16px;margin-bottom:8px;font-size:13px;color:#991b1b">❌ <strong>Weak:</strong> The narrator says ‘we’ve managed to cope.’ This shows adaptation. <em>(No technique named, ‘shows’ is banned, and the quote is just dropped in.)</em></div>
<div style="background:#f0fdf4;border:1px solid #86efac;border-radius:8px;padding:12px 16px;margin-bottom:12px;font-size:13px;color:#166534">✅ <strong>Strong:</strong> Ogawa’s characterisation of the narrator as emotionally dissociated is captured in her late reflection, ‘we’ve managed to cope with all kinds of disappearances in the past’; her flat, affectless tone mirrors the emotional shutdown the regime demands.</div>
<div style="background:#eff6ff;border:1px solid #bfdbfe;border-radius:8px;padding:12px 16px;margin-bottom:12px;font-size:13px;color:#1e40af"><strong>How many quotes?</strong> Aim for about four per paragraph, and make sure each quote actually proves that paragraph’s point. A quote that doesn’t pull its weight is better cut than kept.</div>
<p style="margin-bottom:8px"><strong>Segues (this is where the marks are):</strong> A segue is just the phrase that carries you from one example to the next. It does one of three jobs:</p>
<div style="background:#f8fafc;border:1px solid var(--border);border-radius:8px;padding:14px;margin-bottom:12px">
<p style="margin-bottom:6px"><strong>Go deeper on the same point:</strong> ‘This deepens when…’, ‘This is sharper still as…’</p>
<p style="margin-bottom:6px"><strong>Add another example that builds:</strong> ‘Furthermore…’, ‘The same holds when…’</p>
<p style="margin-bottom:0"><strong>Turn to a new character or idea:</strong> ‘In contrast…’, ‘Similarly…’, ‘Just as the narrator…, so the old man…’</p>
</div>
<div style="background:#fef3c7;border:1px solid #fbbf24;border-radius:8px;padding:12px 16px;margin-bottom:12px;font-family:'DM Sans',sans-serif;font-size:13px;color:#92400e"><strong>Segue rules of thumb:</strong> vary the wording so you’re not repeating the same shape. Don’t reach for ‘However’ every single time. Use the ‘Where X…, Y…’ shape only <em>once</em> in the whole essay, for your strongest turn. And never join with ‘also’ (‘This is also seen when…’), it makes your evidence sound like a shopping list.</div>
<p style="margin-bottom:8px"><strong>Colour-coded model paragraph (Score 10):</strong></p>
${MPLEG}
<div class="model-box">
<div class="model-label">Score 10 · Body Paragraph 1 (Establish)</div>
<div class="model-prompt">Prompt: The Memory Police poses that passivity is the greatest threat to humanity’s survival.</div>
<span class="A">Ogawa exposes the emotional toll of authoritarian erasure by portraying a deeply fragmented response to loss, where characters vacillate between numbing detachment and sudden, uncontainable grief.</span> <span class="T">Ogawa’s characterisation of the narrator as emotionally dissociated is captured in</span> <span class="E">her late-stage reflection, ‘we’ve managed to cope with all kinds of disappearances in the past… I’m sure we’ll be able to cope with whatever comes next’;</span> <span class="An">her flat, affectless tone mirrors the psychological suppression demanded by the regime, where survival depends on silencing emotional depth.</span> <span class="S">Yet this numbness fractures as</span> <span class="T">the narrator confesses to possessing</span> <span class="E">‘a hollow heart full of holes,’</span> <span class="An">a metaphor that unmasks the internal chaos beneath her surface calm. Her coping is unstable, swinging between resolve and despair.</span> <span class="S">Where the narrator embodies the psychological cost of compliance, Ogawa’s characterisation of the old man complicates any simple reading of passivity.</span> <span class="T">The old man usually reinforces the islanders’ quiet acceptance through resigned lines like</span> <span class="E">‘that’s the way things are now.’</span> <span class="S">Yet Ogawa punctures this detachment after the tsunami:</span> <span class="T">despite claiming</span> <span class="E">‘I don’t mind that everything was washed away,’</span> <span class="T">the old man clutches</span> <span class="E">‘the music box, totally unharmed despite all we had been through.’</span> <span class="An">The music box, a gift from R, becomes a symbol of what cannot be fully forgotten; his instinct to save it signals that even people who believe they have accepted loss still hold ties they cannot consciously reach.</span> <span class="L">Here, Ogawa laments that coping under totalitarianism means a divided inner life, where people suppress feeling to survive, yet remain haunted by the urge to remember and connect.</span>
</div>
</div>
</details>

<details style="margin-bottom:12px">
<summary style="font-family:'DM Sans',sans-serif;font-size:16px;font-weight:700;cursor:pointer;padding:14px 16px;background:var(--card);border:1px solid var(--border);border-radius:8px;color:var(--ink)">4. The conclusion: three sentences</summary>
<div style="border:1px solid var(--border);border-top:none;border-radius:0 0 8px 8px;padding:18px;background:var(--card);font-size:14px;line-height:1.8;color:#374151">
<p style="margin-bottom:12px">The conclusion is exactly three sentences. Don’t rewrite your introduction. It should <em>arrive</em> somewhere, not repeat where you began.</p>
<div style="background:#f8fafc;border:1px solid var(--border);border-radius:8px;padding:14px;margin-bottom:12px">
<p style="margin-bottom:8px"><strong style="color:var(--accent)">Sentence 1 · Retrace the journey:</strong> Capture all three paragraphs in one line. Scaffold: ‘Ogawa presents X as something that begins with [P1], deepens into [P2], and finally becomes [P3].’</p>
<p style="margin-bottom:8px"><strong style="color:var(--accent)">Sentence 2 · Zoom out:</strong> Why does it matter? What is Ogawa asking her readers to see about memory, power, or resistance?</p>
<p style="margin-bottom:0"><strong style="color:var(--accent)">Sentence 3 · Final line:</strong> One short, confident sentence that echoes your contention. Keep it clean and decisive.</p>
</div>
<p style="margin-bottom:8px"><strong>Model conclusion:</strong></p>
<div class="model-box" style="margin-bottom:0">
<p><span style="background:#dbeafe;border-bottom:2px solid #3b82f6;border-radius:2px">In <em>The Memory Police</em>, Ogawa traces erasure from enforced silence, into the individual’s own part in forgetting, and finally to the quiet resistance found in remembering and connecting.</span> <span style="background:#ede9fe;border-bottom:2px solid #8b5cf6;border-radius:2px">Through this allegory she warns that the greatest threat is a willingness to accept loss as normal, and that keeping memory alive, however fragile, is the most human act of defiance.</span> <span style="background:#d1fae5;border-bottom:2px solid #059669;border-radius:2px">To forget is to surrender; to remember is to survive.</span></p>
<div class="legend" style="margin-top:8px">
<span class="leg-item" style="background:#dbeafe;color:#1e40af;border-color:#3b82f6">Retrace the journey</span>
<span class="leg-item" style="background:#ede9fe;color:#5b21b6;border-color:#8b5cf6">Zoom out</span>
<span class="leg-item" style="background:#d1fae5;color:#065f46;border-color:#059669">Final line</span>
</div>
</div>
</div>
</details>

<details style="margin-bottom:12px">
<summary style="font-family:'DM Sans',sans-serif;font-size:16px;font-weight:700;cursor:pointer;padding:14px 16px;background:var(--card);border:1px solid var(--border);border-radius:8px;color:var(--ink)">5. Language and style: how to sound like a top essay</summary>
<div style="border:1px solid var(--border);border-top:none;border-radius:0 0 8px 8px;padding:18px;background:var(--card);font-size:14px;line-height:1.8;color:#374151">
<div style="background:#f0fdf4;border:1px solid #86efac;border-radius:8px;padding:12px 16px;margin-bottom:12px;font-size:13px;color:#166534"><strong>Clear beats clever.</strong> Write your point in plain words first. Then read every sentence back and ask: can I say this more simply? If a line sounds like it belongs on a motivational poster, cut it. The best essays are clear, not flowery. A good habit is to draft a paragraph, then rewrite it once just to make it plainer before you move on.</div>
<p style="margin-bottom:8px"><strong>Give Ogawa verbs with attitude.</strong> Use verbs that carry a view: <em>explores, reveals, laments, exposes, positions, frames, warns</em>. Never use ‘shows,’ ‘demonstrates,’ ‘argues’ or ‘contends’, Ogawa writes fiction, she doesn’t argue a case. And never write ‘This suggests…’; write ‘Here, Ogawa reveals…’ instead. (There’s a full list on the <strong>Authorial Verbs</strong> page.)</p>
<p style="margin-bottom:8px"><strong>Habits that pull your marks down:</strong></p>
<div style="background:#fef2f2;border:1px solid #fca5a5;border-radius:8px;padding:12px 16px;margin-bottom:12px;font-size:13px;color:#991b1b">
<p style="margin-bottom:6px">❌ <strong>Fancy verbs that add nothing:</strong> ‘lands,’ ‘surfaces,’ ‘conjures,’ ‘elevates,’ ‘gives way to.’ Swap them for a plain verb: names, sets up, contrasts, describes, reveals.</p>
<p style="margin-bottom:6px">❌ <strong>Em dashes.</strong> Use commas, semicolons or full stops instead.</p>
<p style="margin-bottom:6px">❌ <strong>‘Not X, but Y’ as a reflex.</strong> Only use it when you’re genuinely contrasting two real things.</p>
<p style="margin-bottom:0">❌ <strong>Talking about your own essay:</strong> ‘this paragraph,’ ‘this movement,’ ‘this complicates the prompt.’ Only Ogawa and the novel exist on the page. To point back, name the moment in the book (‘the book burning’), not the paragraph.</p>
</div>
<div style="background:#eff6ff;border:1px solid #bfdbfe;border-radius:8px;padding:12px 16px;margin-bottom:12px;font-size:13px;color:#1e40af"><strong>Use the book’s own words.</strong> Say ‘disappeared’ and ‘the disappearances’ (not ‘erased’), and ‘the hidden room.’ Borrowing the novel’s vocabulary keeps your analysis rooted in the text.</div>
<div style="background:#fef3c7;border:1px solid #fbbf24;border-radius:8px;padding:12px 16px;font-family:'DM Sans',sans-serif;font-size:13px;color:#92400e"><strong>Don’t overclaim.</strong> If you say something fails, also name what it achieves. ‘Writing saves no one’ is too blunt. ‘Writing cannot stop the disappearances, yet it carries the narrator’s voice past them’ holds both the limit and the achievement, and that nuance is what top markers reward.</div>
</div>
</details>`;}function _tnorm(x){return (x||"").toLowerCase().replace(/[‘’]/g,"'").replace(/[“”]/g,'"').replace(/[^a-z0-9 ]/g," ").replace(/\s+/g," ").trim();}
function findThemeQuote(ch,snip,pg){
const snw=_tnorm(snip).split("...").join(" ").split(" ").filter(w=>w.length>3);
let best=null,bestScore=0;
const local=(CH.find(c=>c.n===ch)||{q:[]}).q;
const all=[].concat(...CH.map(c=>c.q));
for(const pool of [local,all]){
for(const cq of pool){const cn=_tnorm(cq.q);const sh=snw.filter(w=>cn.includes(w)).length;let score=sh/Math.max(snw.length,1);if(cq.p===pg)score+=0.15;if(score>bestScore){bestScore=score;best=cq;}}
if(bestScore>=0.5)break;
}
return bestScore>=0.5?best:null;
}

{t:"The Narrator\u2019s Unreliability",c:"#EC4899",d:"The narrator is morally complex: she urges the Inuis to comply, hides R partly for self-interest, reads his grief as \u2018peaceful,\u2019 rationalises his physical decline as natural \u2018recompense,\u2019 and minimises the significance of the disappearances. Her \u2018hollow heart\u2019 prevents her from fully empathising with others\u2019 suffering. Ogawa constructs someone whose emotional and moral capacity has been eroded by the very system she lives within.",

2:`<div class="model-prompt">Prompt: How does The Memory Police suggest that memories are essential to give life meaning?</div>
<span class="A">Ogawa laments the severing of relational memory, positioning the disappearance of birds as a loss that extends far beyond the physical to encompass identity, connection, and selfhood.</span> <span class="T">Ogawa\u2019s characterisation of the narrator as emotionally dissociated is captured in her reflection that the bird</span> <span class="E">\u2018should have been intertwined with memories of my father,\u2019</span> <span class="An">yet the conditional \u2018should\u2019 reveals a cruel paradox: the narrator retains intellectual knowledge of loss while the emotional connection has been entirely severed. The disappearance of birds is simultaneously the disappearance of her father.</span> <span class="L">Here, Ogawa reveals that memories give life meaning not through objects themselves but through the relationships those objects sustain.</span> <span class="S">Where the narrator\u2019s detachment reveals the individual cost of forgetting, the islanders\u2019 collective farewell exposes its communal dimension.</span> <span class="T">Ogawa\u2019s intimate imagery captures citizens</span> <span class="E">\u2018rubbing them against their cheeks, still others giving them a treat, mouth to beak,\u2019</span> <span class="An">the tactile tenderness of the farewells jarringly juxtaposed with the finality of their compliance: they clearly grieve, yet proceed to destroy anyway.</span> <span class="S">This contradiction deepens as</span> <span class="T">Ogawa\u2019s personification transforms the aftermath into eerie stillness:</span> <span class="E">\u2018a calm fell as though the air itself were breathing with infinite care.\u2019</span> <span class="An">The calm that follows is not peace but the silence of a people who have learned to swallow their sorrow almost instantly.</span> <span class="L">Here, Ogawa mourns how totalitarian regimes depend on this rapid emotional suppression, erasing not just the objects that carry meaning but the capacity to grieve their loss.</span>`,
4:`<div class="model-prompt">Prompt: In The Memory Police, silence is both a tool of oppression and a tool of resistance. Discuss.</div>
<span class="A">Ogawa exposes how the regime weaponises silence, enforcing compliance through fear so pervasive that citizens silence not only themselves but one another.</span> <span class="T">Ogawa\u2019s imagery captures the Memory Police arriving with</span> <span class="E">\u2018badges glinting from their collars,\u2019 going about \u2018their appointed task with terrible efficiency,\u2019</span> <span class="An">the oxymoronic fusion of bureaucratic order and violence positioning authoritarianism as a machine rather than a person, its impersonality making it both more terrifying and harder to resist.</span> <span class="S">This institutional silence extends to the citizens themselves, as</span> <span class="T">Ogawa\u2019s characterisation of the crowd reveals bystanders who</span> <span class="E">\u2018turned to look disapprovingly\u2019 because \u2018they were afraid of creating a disturbance, of giving the police reason to notice them.\u2019</span> <span class="An">The crowd\u2019s disapproval reveals the self-policing nature of totalitarianism: the regime need not monitor every individual when fear ensures that neighbours enforce silence upon one another.</span> <span class="S">Where the regime deploys silence as control, Ogawa\u2019s characterisation of R positions quiet speech as defiance.</span> <span class="T">R\u2019s observation that</span> <span class="E">\u2018it seems strange that you can still create something totally new like this, just from words, on an island where everything else is disappearing\u2019</span> <span class="An">frames storytelling as the antithesis of the regime\u2019s silence: words generate meaning in a world that systematically destroys it.</span> <span class="L">Here, Ogawa quietly celebrates literature as an act of defiance, suggesting that the creative act is one of the few forces capable of pushing back against enforced silence.</span>`,
5:`<div class="model-prompt">Prompt: The Memory Police poses that passivity is the greatest threat to humanity\u2019s survival.</div>
<span class="A">Ogawa reveals a spectrum of responses to authoritarian power, positioning the narrator\u2019s instinct toward compliance as more devastating than the regime\u2019s violence itself.</span> <span class="T">Ogawa\u2019s understated prose captures the narrator\u2019s account of her mother\u2019s death:</span> <span class="E">\u2018Her body came back to us a week later, along with her death certificate. It listed the cause of death as a heart attack.\u2019</span> <span class="An">The clinical, flat delivery of state murder mirrors the narrator\u2019s emotional suppression; the passive construction strips the event of agency or outrage, revealing how bureaucratic language sanitises totalitarian violence.</span> <span class="S">This passivity deepens as</span> <span class="T">Ogawa\u2019s characterisation of the narrator as instinctively deferential is exposed in her appeal to the Inui family:</span> <span class="E">\u2018Wouldn\u2019t it be better to obey their orders? Your children are still so young.\u2019</span> <span class="An">Her pragmatism disguises submission as care, positioning her as a morally ambiguous figure whose impulse is acquiescence rather than solidarity.</span> <span class="S">Where the narrator embodies internalised passivity, Ogawa\u2019s characterisation of Mrs. Inui positions resistance as a principled choice.</span> <span class="T">Mrs. Inui\u2019s resolute declaration,</span> <span class="E">\u2018we have no intention of helping the Memory Police,\u2019</span> <span class="An">placed directly after the narrator\u2019s appeal for submission, exposes the moral failure of passive acceptance.</span> <span class="L">Here, Ogawa quietly celebrates those who choose resistance despite the cost, whilst positioning the narrator\u2019s passivity as the greater threat to human survival.</span>`,
7:`<div class="model-prompt">Prompt: How does The Memory Police suggest that memories are essential to give life meaning?</div>
<span class="A">Ogawa reveals the devastating cognitive dissonance of a people who sense the magnitude of their loss yet lack the emotional resources to resist it, positioning the erosion of memory as the erosion of meaning itself.</span> <span class="T">The narrator\u2019s rare moment of existential clarity is captured in her metaphor:</span> <span class="E">\u2018If it goes on like this and we can\u2019t compensate for the things that get lost, the island will soon be nothing but absences and holes.\u2019</span> <span class="An">The image of the island as \u2018absences and holes\u2019 mirrors the narrator\u2019s own \u2018hollow heart,\u2019 fusing external loss with internal erosion. Ogawa positions this fleeting awareness as devastating precisely because the narrator cannot sustain it.</span> <span class="S">Where the narrator glimpses the truth of erasure, Ogawa\u2019s characterisation of the old man complicates any simple reading of acceptance.</span> <span class="T">The old man\u2019s hesitant admission that the island was once</span> <span class="E">\u2018a lot fuller, a lot more real\u2019</span> <span class="An">reveals that even he senses the magnitude of what has been lost, yet he cannot hold the feeling long enough to act on it.</span> <span class="S">This flickering awareness is extinguished as</span> <span class="T">Ogawa\u2019s extended metaphor captures his self-protective philosophy:</span> <span class="E">\u2018as things got thinner, more full of holes, our hearts got thinner, too, diluted somehow.\u2019</span> <span class="An">The old man frames his own dissolution as natural balance rather than catastrophe, revealing the depth of his conditioning.</span> <span class="L">Here, Ogawa laments how totalitarianism teaches its citizens to accept their own dissolution as inevitable, stripping life of meaning by erasing the capacity to recognise what has been taken.</span>`,
11:`<div class="model-prompt">Prompt: How does The Memory Police suggest that memories are essential to give life meaning?</div>
<span class="A">Ogawa positions memory and emotional depth as inseparable, revealing through the exchange between the narrator and R that to lose one is to lose the other, and with it, the capacity for a meaningful life.</span> <span class="T">Ogawa\u2019s characterisation of R as emotionally generative is captured in his metaphor:</span> <span class="E">\u2018A heart has no shape, no limits. That\u2019s why you can put almost any kind of thing in it, why it can hold so much. It\u2019s much like your memory, in that sense.\u2019</span> <span class="An">R fuses heart and memory into a single concept, positioning the capacity to remember as inseparable from the capacity to love. Ogawa reveals what may be the novel\u2019s central argument: to lose memory is to lose the possibility of emotional connection.</span> <span class="S">This is deepened as</span> <span class="T">R\u2019s simile frames memory as organic and potentially renewable:</span> <span class="E">\u2018Like tiny seeds that might germinate again if the rain falls.\u2019</span> <span class="S">Where R embodies the hopeful possibility of renewal, the narrator\u2019s response exposes the devastating reality of what the disappearances have cost.</span> <span class="T">Ogawa\u2019s characterisation of the narrator as hollowed is captured in her confession:</span> <span class="E">\u2018I have no seeds inside me, waiting to sprout again. I have to make do with a hollow heart full of holes.\u2019</span> <span class="An">The contrast between R\u2019s \u2018seeds\u2019 and the narrator\u2019s \u2018holes\u2019 is the novel\u2019s starkest articulation of what erasure costs: not just objects but the emotional infrastructure that makes a person whole.</span> <span class="L">Here, Ogawa laments that the deepest wound of totalitarianism is the hollowing of the inner self, leaving a life that persists but can no longer hold meaning.</span>`,
13:`<div class="model-prompt">Prompt: In The Memory Police, silence is both a tool of oppression and a tool of resistance. Discuss.</div>
<span class="A">Ogawa reveals the regime\u2019s capacity to rationalise its own violence, positioning its enforced silence as a calculated strategy rather than an unconscious reflex.</span> <span class="T">The Memory Police Chief\u2019s medical metaphor captures the regime\u2019s self-justifying logic:</span> <span class="E">\u2018If your big toe becomes infected with gangrene, you cut it off as soon as you can. If you do nothing, you end up losing the whole leg.\u2019</span> <span class="An">The Chief positions memory as a corrosive force threatening the regime\u2019s power. His tone is menace, not reassurance: he knows exactly why memory is dangerous, and the surgical language names the wound the regime will later inflict, foreshadowing the literal disappearance of left legs in Chapter 25.</span> <span class="S">Where the regime deploys silence as control, Ogawa positions the narrator\u2019s emotional transparency as a fragile counterforce.</span> <span class="T">The narrator\u2019s confession to the old man,</span> <span class="E">\u2018I\u2019m not afraid of being arrested. I\u2019m afraid that you\u2019ll disappear. That\u2019s why I\u2019m trembling like this,\u2019</span> <span class="An">is one of her most emotionally transparent moments, revealing that attachment, not ideology, is what breaks through the regime\u2019s enforced silence.</span> <span class="S">Yet a deeper contradiction surfaces, as</span> <span class="T">the narrator\u2019s paradoxical suggestion to R reveals the depth of her conditioning:</span> <span class="E">\u2018If you could let yours fade away like the rest of us, there\u2019d be no need.\u2019</span> <span class="An">She envies R\u2019s capacity for memory yet simultaneously wishes he would surrender it, revealing how authoritarian conditioning distorts even the most intimate relationships.</span> <span class="L">Here, Ogawa exposes silence as something that operates both externally and internally: imposed by the regime and then internalised so deeply that even love cannot fully displace it.</span>`,
14:`<div class="model-prompt">Prompt: How does The Memory Police suggest that memories are essential to give life meaning?</div>
<span class="A">Ogawa mourns the impossible cost of preserving memory under totalitarianism, positioning R\u2019s physical deterioration as evidence that a life of enforced forgetting and a life of enforced remembering both extract a devastating toll.</span> <span class="T">Ogawa\u2019s recurring swamp metaphor captures the narrator\u2019s psyche as a place where memories are submerged rather than erased:</span> <span class="E">\u2018my memories of them had been fixed in place and had sunk into the bottomless swamp of my soul.\u2019</span> <span class="An">Ogawa suggests that forgetting is not a clean process but a submersion: the memories remain, inaccessible and suffocating, leaving the narrator aware of her damage yet unable to reach what has been taken.</span> <span class="S">Where the narrator\u2019s inner world is a swamp of inaccessible memory, R\u2019s physical body enacts a parallel dissolution.</span> <span class="T">Ogawa\u2019s imagery captures R\u2019s decline as</span> <span class="E">\u2018the outline of his body blurring, his blood thinning, his muscles withering.\u2019</span> <span class="An">The verbs position R\u2019s deterioration as both physical and metaphysical: confinement erodes the boundary between presence and absence.</span> <span class="S">This is deepened as</span> <span class="T">Ogawa\u2019s characterisation of the narrator as unreliable is captured in her rationalisation:</span> <span class="E">\u2018In recompense for a mind that was able to retain everything, every memory, perhaps it was necessary that the body gradually fade away.\u2019</span> <span class="An">The narrator frames R\u2019s suffering as natural \u2018recompense\u2019 rather than a consequence of his imprisonment, revealing how internalised authoritarianism distorts ethical thinking.</span> <span class="L">Here, Ogawa laments that memory is essential to a meaningful life, yet preserving it under totalitarian rule demands a sacrifice so great it risks destroying the very person it seeks to sustain.</span>`,
15:`<div class="model-prompt">Prompt: In The Memory Police, silence is both a tool of oppression and a tool of resistance. Discuss.</div>
<span class="A">Ogawa positions the embedded narrative as the novel\u2019s most explicit articulation of how silence functions as a mechanism of totalitarian possession, revealing that the process of acclimatisation to voicelessness is itself the primary instrument of control.</span> <span class="T">The typing teacher\u2019s chilling reassurance to the typist captures the logic of normalisation:</span> <span class="E">\u2018You may find it annoying at first, until you get used to it\u2026 There\u2019s nothing to worry about, nothing to fear. Then, at last, you\u2019ll be all mine.\u2019</span> <span class="An">The phrase \u2018getting used to it\u2019 mirrors the islanders\u2019 own acclimatisation to loss, whilst the possessive \u2018you\u2019ll be all mine\u2019 exposes the intimate violence concealed beneath the language of reassurance.</span> <span class="S">This enforced silence reaches its fullest articulation as</span> <span class="T">Ogawa\u2019s metafictional embedded narrative captures the typist\u2019s reflection:</span> <span class="E">\u2018When you lost your voice, you lost the ability to make sense of yourself.\u2019</span> <span class="An">Ogawa positions voice as a synecdoche for selfhood: the capacity to articulate experience is inseparable from the capacity to exist as a full human being. The typist\u2019s loss mirrors the narrator\u2019s trajectory, reinforcing the structural parallel between the embedded narrative and the main story.</span> <span class="S">Where the embedded narrative reveals the cost of silencing, the main narrative captures its temporal dimension as</span> <span class="T">the old man\u2019s observation positions the disappearance of calendars as the loss of the future itself:</span> <span class="E">\u2018With the calendars gone, no matter how long we wait, we\u2019ll never get to a new month\u2026 so spring will never come.\u2019</span> <span class="L">Here, Ogawa laments that the regime\u2019s enforced silence destroys not just the past through erasure of memory, but the possibility of renewal through the elimination of hope.</span>`,
16:`<div class="model-prompt">Prompt: The Memory Police poses that passivity is the greatest threat to humanity\u2019s survival.</div>
<span class="A">Ogawa reveals that even within a world defined by passive compliance, fragile acts of care and preservation emerge as the only means of sustaining humanity under authoritarian erasure.</span> <span class="T">Ogawa\u2019s characterisation of the narrator\u2019s residual compassion is captured in her spontaneous generosity:</span> <span class="E">\u2018the void in the basket struck me as so sad that I filled it with the celery.\u2019</span> <span class="An">The \u2018void in the basket\u2019 functions as a symbol of the emptiness pervading the island, and the narrator\u2019s impulse to fill it reveals that kindness persists even in the most depleted circumstances.</span> <span class="S">Where the narrator\u2019s instinct is to fill absence, R\u2019s influence transforms that instinct into purposeful defiance.</span> <span class="T">R\u2019s modest plea captures the novel\u2019s ethos of fragile resistance:</span> <span class="E">\u2018I\u2019ll be happy if I can help delay or stop this decay in your hearts even in some small way.\u2019</span> <span class="An">R does not promise victory, only the possibility of slowing destruction; Ogawa positions his gentle realism as the moral centre of the text.</span> <span class="S">This influence is transformative, as</span> <span class="T">the narrator\u2019s resolve marks a turning point in her characterisation:</span> <span class="E">\u2018I knew instinctively that I had to keep silent. But that was also when I decided to begin hiding as many of the objects that disappeared as I could.\u2019</span> <span class="An">Silence and preservation coexist: the narrator cannot remember, but she can protect objects for someone who can. R\u2019s influence transforms compliance into fragile defiance.</span> <span class="L">Here, Ogawa affirms that resistance need not require understanding or even memory; sometimes it is enough to preserve what matters to someone you love, and that these small acts of care are what distinguish survival from mere passivity.</span>`

const MPLEG=`<div class="legend" style="margin-bottom:10px"><span class="leg-item" style="background:#dbeafe;color:#1e40af;border-color:#3b82f6" data-tip="Argument: Topic sentence with claim and connotative verb">A</span><span class="leg-item" style="background:#ede9fe;color:#5b21b6;border-color:#8b5cf6" data-tip="Technique: Name the device before the quote">T</span><span class="leg-item" style="background:#fef3c7;color:#92400e;border-color:#d97706" data-tip="Evidence: Embedded quote">E</span><span class="leg-item" style="background:#d1fae5;color:#065f46;border-color:#059669" data-tip="Analysis: What the technique does to meaning">An</span><span class="leg-item" style="background:#fce7f3;color:#9d174d;border-color:#db2777" data-tip="Linking: Connects back to topic sentence">L</span><span class="leg-item" style="background:#fff7ed;color:#9a3412;border-color:#ea580c" data-tip="Segue: Connects to next quote or character">S</span></div>`;
const INTROLEG=`<div class="legend" style="margin-bottom:6px"><span class="leg-item" style="background:#dbeafe;color:#1e40af;border-color:#3b82f6" data-tip="Context: collection, author, form and themes">Context</span><span class="leg-item" style="background:#d1fae5;color:#065f46;border-color:#059669" data-tip="Contention: your main argument answering the prompt">Contention</span><span class="leg-item" style="background:#fff7ed;color:#9a3412;border-color:#ea580c" data-tip="Complexity / Signposting: how the argument develops">Complexity</span><span class="leg-item" style="background:#ede9fe;color:#5b21b6;border-color:#8b5cf6" data-tip="Cute one-liner: a memorable closing sentence">Cute one-liner</span></div>`;

function renderEssays(){
return`<h1>Model Essays</h1><p style="font-size:14px;color:var(--muted);margin:8px 0 16px;font-family:'DM Sans',sans-serif">Click a question to open three full model essays for it, written at Score 5, Score 7 and Score 9–10. Each is colour-coded by ATEALS so you can see how the parts of a paragraph fit together.</p>
${QUESTIONS.map(q=>`<div class="quote-card" style="margin-bottom:10px"><button class="quote-header" onclick="go('${q.id}')" style="align-items:center"><span class="q-icon" style="color:var(--accent)">?</span><div style="flex:1"><div class="q-text" style="font-style:normal;font-weight:600;color:var(--ink)">${q.prompt}</div><div class="q-meta">${q.essays.length} model essays · Score 5, 7 &amp; 9–10</div></div><span class="q-arrow">›</span></button></div>`).join("")}`;
}
function renderEssayQ(q){
return`<div style="margin-bottom:8px"><button onclick="go('essays')" style="background:none;border:1px solid var(--border);border-radius:6px;padding:6px 12px;font-size:12px;color:var(--accent);font-family:'DM Sans',sans-serif;font-weight:600;cursor:pointer">← All questions</button></div>
<h1 style="font-size:21px;line-height:1.3">${q.prompt}</h1>
<p style="font-size:14px;color:var(--muted);margin:8px 0 16px;font-family:'DM Sans',sans-serif">Three full essays answering this prompt at different score levels. Click a score to expand. All three share the same structure and evidence; the difference is the depth of analysis and the complexity of the writing.</p>
${q.strategy?`<div style="background:#faf9f6;border:1px solid var(--border);border-left:4px solid var(--accent);border-radius:10px;padding:16px 18px;margin:0 0 18px">
<div style="font-family:'DM Sans',sans-serif;font-weight:700;font-size:15px;color:var(--ink);margin-bottom:8px">How to approach this prompt</div>
<p style="font-size:14px;line-height:1.7;color:#374151;margin:0 0 12px">${q.strategy.overview}</p>
<div style="display:flex;flex-direction:column;gap:8px">
<div style="display:flex;gap:10px;align-items:flex-start"><span style="flex-shrink:0;background:#dbeafe;color:#1e40af;font-family:'DM Sans',sans-serif;font-weight:700;font-size:10.5px;letter-spacing:.3px;padding:3px 8px;border-radius:4px;margin-top:2px;white-space:nowrap">P1 · ESTABLISH</span><span style="font-size:14px;line-height:1.6;color:#374151">${q.strategy.p1}</span></div>
<div style="display:flex;gap:10px;align-items:flex-start"><span style="flex-shrink:0;background:#fef3c7;color:#92400e;font-family:'DM Sans',sans-serif;font-weight:700;font-size:10.5px;letter-spacing:.3px;padding:3px 8px;border-radius:4px;margin-top:2px;white-space:nowrap">P2 · COMPLICATE</span><span style="font-size:14px;line-height:1.6;color:#374151">${q.strategy.p2}</span></div>
<div style="display:flex;gap:10px;align-items:flex-start"><span style="flex-shrink:0;background:#d1fae5;color:#065f46;font-family:'DM Sans',sans-serif;font-weight:700;font-size:10.5px;letter-spacing:.3px;padding:3px 8px;border-radius:4px;margin-top:2px;white-space:nowrap">P3 · RESOLVE</span><span style="font-size:14px;line-height:1.6;color:#374151">${q.strategy.p3}</span></div>
</div>
<p style="font-size:13.5px;line-height:1.7;color:var(--muted);font-style:italic;margin:12px 0 0">${q.strategy.closer}</p>
</div>`:""}
${q.essays.map(e=>`
<details style="margin-bottom:16px">
<summary style="font-family:'DM Sans',sans-serif;font-size:16px;font-weight:700;cursor:pointer;padding:12px 16px;background:var(--card);border:1px solid var(--border);border-radius:8px;color:var(--ink)">${e.label}</summary>
<div style="border:1px solid var(--border);border-top:none;border-radius:0 0 8px 8px;padding:18px;background:var(--card)">
<h3 style="color:var(--accent);margin-bottom:6px">Introduction <span style="font-weight:400;font-size:12px;color:var(--muted)">— the 4 Cs</span></h3>
${INTROLEG}
<div class="model-box" style="margin:8px 0 18px">${e.intro}</div>
<h3 style="color:var(--accent);margin-bottom:6px">Body paragraphs <span style="font-weight:400;font-size:12px;color:var(--muted)">— ATEALS</span></h3>
${MPLEG}
<h3 style="margin:12px 0 4px"><span style="background:#dbeafe;color:#1e40af;padding:2px 8px;border-radius:4px;font-size:12px;font-family:'DM Sans',sans-serif">BODY 1 · ESTABLISH</span></h3>
<p style="font-size:12px;color:var(--muted);font-family:'DM Sans',sans-serif;margin:4px 0 8px"><strong>Topic:</strong> ${e.p1t}</p>
<div class="model-box" style="margin-bottom:16px">${e.p1}</div>
<h3 style="margin:12px 0 4px"><span style="background:#fef3c7;color:#92400e;padding:2px 8px;border-radius:4px;font-size:12px;font-family:'DM Sans',sans-serif">BODY 2 · COMPLICATE</span></h3>
<p style="font-size:12px;color:var(--muted);font-family:'DM Sans',sans-serif;margin:4px 0 8px"><strong>Topic:</strong> ${e.p2t}</p>
<div class="model-box" style="margin-bottom:16px">${e.p2}</div>
<h3 style="margin:12px 0 4px"><span style="background:#d1fae5;color:#065f46;padding:2px 8px;border-radius:4px;font-size:12px;font-family:'DM Sans',sans-serif">BODY 3 · RESOLVE</span></h3>
<p style="font-size:12px;color:var(--muted);font-family:'DM Sans',sans-serif;margin:4px 0 8px"><strong>Topic:</strong> ${e.p3t}</p>
<div class="model-box" style="margin-bottom:16px">${e.p3}</div>
<h3 style="color:var(--accent);margin-bottom:8px">Conclusion</h3>
<div class="model-box">${e.conc}</div>
</div></details>`).join("")}`;
}
function renderVerbs(){
const cats=[
{t:"Positive / Affirming",c:"#10B981",v:[
{w:"quietly celebrates",d:"Affirms something positive with restraint. Use for moments of warmth, care, or resistance.",ex:"Ogawa <strong>quietly celebrates</strong> kindness as a form of resistance."},
{w:"affirms",d:"Validates or endorses. Use when Ogawa\u2019s text makes a positive claim about human nature or connection.",ex:"Ogawa <strong>affirms</strong> that relationships sustain selfhood under authoritarian erasure."},
{w:"acknowledges",d:"Recognises honestly, without flinching. Use when Ogawa confronts a difficult truth but treats it with respect.",ex:"Ogawa <strong>acknowledges</strong> the quiet courage of those who preserve memory in secret."},
{w:"honours",d:"Treats something as worthy of reverence. Use when Ogawa dignifies a character, act, or quality.",ex:"Ogawa <strong>honours</strong> the narrator\u2019s persistence in finishing her novel despite her dissolving body."},
{w:"preserves",d:"Keeps something alive through craft. Use when Ogawa\u2019s writing itself enacts the act of saving.",ex:"Through the embedded narrative, Ogawa <strong>preserves</strong> the typist\u2019s voice even as the character loses hers."},
{w:"defends",d:"Stands up for a value or principle. Use when Ogawa\u2019s text protects something under threat.",ex:"Ogawa <strong>defends</strong> the right to grieve in a world that demands emotional suppression."},
]},
{t:"Neutral / Analytical",c:"#3B82F6",v:[
{w:"reveals",d:"Uncovers something hidden. One of the most versatile verbs. Use when analysis exposes a deeper meaning beneath the surface.",ex:"Ogawa <strong>reveals</strong> that the most insidious form of oppression colonises the mind."},
{w:"positions",d:"Places the reader to see something a particular way. Use when Ogawa constructs a deliberate interpretation or alignment.",ex:"Ogawa <strong>positions</strong> memory as inseparable from the capacity for love."},
{w:"frames",d:"Builds a particular way of looking at something. Similar to positions but with more emphasis on the construction itself.",ex:"Ogawa <strong>frames</strong> forgetting as both survival mechanism and self-annihilation."},
{w:"explores",d:"Investigates without reaching a fixed conclusion. Use for complex, ambiguous, or unresolved moments.",ex:"Ogawa <strong>explores</strong> the tragic gap between recognising loss and being able to reverse it."},
{w:"constructs",d:"Deliberately builds. Use when discussing characterisation, narrative structure, or allegorical design.",ex:"Ogawa <strong>constructs</strong> the narrator as complicit in her own erasure."},
{w:"suggests",d:"Implies without stating directly. Use for subtle, understated, or ambiguous moments.",ex:"Ogawa <strong>suggests</strong> that human connection is more durable than material possession."},
{w:"captures",d:"Seizes a moment, quality, or feeling with precision. Use when a quote or image pins something down exactly.",ex:"Ogawa <strong>captures</strong> the islanders\u2019 fractured grief in the image of citizens releasing birds \u2018mouth to beak.\u2019"},
{w:"traces",d:"Follows a development, pattern, or trajectory across the text. Use when tracking an arc or escalation.",ex:"Ogawa <strong>traces</strong> the narrator\u2019s moral erosion from reluctant compliance to active self-delusion."},
{w:"renders",d:"Depicts with particular effect or technique. Use when Ogawa\u2019s craft choices shape how we experience a moment.",ex:"Ogawa <strong>renders</strong> R\u2019s physical decline through imagery of blurring, thinning, and withering."},
{w:"illustrates",d:"Makes visible through example. Use when a specific moment embodies a broader pattern or argument.",ex:"Ogawa <strong>illustrates</strong> the regime\u2019s self-policing mechanism through the crowd\u2019s disapproving glances."},
{w:"presents",d:"Offers for the reader\u2019s consideration. More neutral than positions. Use when Ogawa lays something out without forcing a judgement.",ex:"Ogawa <strong>presents</strong> the old man\u2019s fatalism as both a survival strategy and a moral failure."},
{w:"conveys",d:"Communicates a feeling, mood, or meaning. Use when the effect is emotional or atmospheric rather than argumentative.",ex:"Ogawa <strong>conveys</strong> the eerie stillness of collective forgetting through the air \u2018breathing with infinite care.\u2019"},
]},
{t:"Critical / Negative",c:"#EF4444",v:[
{w:"laments",d:"Expresses quiet grief. One of the strongest verbs for Ogawa\u2019s restrained, devastating treatment of loss. Use when the text mourns something without melodrama.",ex:"Ogawa <strong>laments</strong> the slow erosion of identity under authoritarian rule."},
{w:"mourns",d:"Grieves openly. Stronger than laments. Use for the novel\u2019s most devastating losses and irrecoverable damage.",ex:"Ogawa <strong>mourns</strong> the gap between what people feel and what they permit themselves to resist."},
{w:"exposes",d:"Strips away a pretence to reveal an uncomfortable truth. Use when Ogawa unmasks hypocrisy, self-delusion, or hidden violence.",ex:"Ogawa <strong>exposes</strong> how totalitarian regimes make violence mundane through bureaucratic language."},
{w:"warns",d:"Cautions the reader about a danger or trajectory. Use when Ogawa\u2019s text carries a moral or political message.",ex:"Ogawa <strong>warns</strong> that authoritarian regimes escalate gradually, relying on citizens\u2019 adaptation."},
{w:"critiques",d:"Evaluates negatively. Use when Ogawa holds a system, behaviour, or ideology up for scrutiny.",ex:"Ogawa <strong>critiques</strong> the islanders\u2019 willingness to aestheticise their own destruction."},
{w:"undermines",d:"Weakens or subverts a claim, assumption, or surface reading. Use when the text quietly contradicts what a character says or believes.",ex:"Ogawa <strong>undermines</strong> the old man\u2019s claim of acceptance through his instinct to clutch the music box."},
{w:"unsettles",d:"Disturbs the reader\u2019s comfort or certainty. Use when a moment is designed to make us uneasy.",ex:"Ogawa <strong>unsettles</strong> the reader by framing the narrator\u2019s \u2018rescue\u2019 of R as an act of possession."},
{w:"destabilises",d:"Shakes a certainty or structure. Stronger than unsettles. Use when Ogawa dismantles a comfortable reading.",ex:"Ogawa <strong>destabilises</strong> the narrator\u2019s claim of love by exposing its entanglement with control."},
{w:"questions",d:"Interrogates an assumption or value. Use when Ogawa invites doubt without providing answers.",ex:"Ogawa <strong>questions</strong> whether the narrator\u2019s protection of R serves his needs or her own."},
{w:"condemns",d:"Judges harshly. The strongest critical verb. Use sparingly, for the regime\u2019s most explicit acts of violence or cruelty.",ex:"Ogawa <strong>condemns</strong> the regime\u2019s conversion of a theatre into a headquarters for surveillance and control."},
]},
{t:"BANNED Verbs",c:"#94a3b8",v:[
{w:"shows",d:"Too vague. Replace with reveals, exposes, captures, or positions.",ex:""},
{w:"demonstrates",d:"Too academic. Replace with reveals, captures, illustrates, or renders.",ex:""},
{w:"argues / contends",d:"Ogawa writes fiction, not arguments. She explores, reveals, laments, mourns.",ex:""},
]}
];
return`<h1>Authorial Verbs</h1>
<p style="font-size:14px;color:var(--muted);margin:8px 0 16px;font-family:'DM Sans',sans-serif">The verb you choose tells the marker whether you\u2019re describing content or analysing authorial choices. Ogawa is writing fiction: she <em>explores, reveals, laments, mourns</em>. She does not \u2018argue\u2019 or \u2018contend.\u2019</p>
<div style="background:#fef3c7;border:1px solid #fbbf24;border-radius:8px;padding:12px 16px;margin-bottom:16px;font-family:'DM Sans',sans-serif;font-size:13px;color:#92400e"><strong>Instead of \u2018This suggests\u2019</strong> \u2192 write \u2018Here, Ogawa frames\u2026\u2019 or \u2018Here, Ogawa positions\u2026\u2019<br><strong>Instead of \u2018This shows\u2019</strong> \u2192 write \u2018Here, Ogawa reveals\u2026\u2019 or \u2018Here, Ogawa exposes\u2026\u2019</div>
${cats.map(cat=>`
<div style="margin-bottom:20px">
<h2 style="font-size:15px;border-left:4px solid ${cat.c};padding-left:10px;margin-bottom:10px">${cat.t}</h2>
${cat.v.map(v=>`<div style="background:var(--card);border:1px solid var(--border);border-radius:8px;padding:12px 16px;margin-bottom:8px">
<div style="font-family:'DM Sans',sans-serif;font-weight:700;font-size:15px;color:var(--ink);margin-bottom:4px">${v.w}</div>
<div style="font-size:13px;color:#374151;line-height:1.6;margin-bottom:${v.ex?"6px":"0"}">${v.d}</div>
${v.ex?`<div style="font-size:13px;color:var(--muted);font-style:italic;line-height:1.6">${v.ex}</div>`:""}</div>`).join("")}
</div>`).join("")}`;
}

render();
</script>
